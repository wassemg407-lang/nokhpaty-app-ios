workflows:
  ios-workflow:
    name: iOS Build

    environment:
      node: 18

    scripts:
      - npm install
      - npm install @capacitor/core @capacitor/cli

      # 👇 مهم جدًا: نرجع sync بس بطريقة آمنة
      - npx cap sync ios

      # 👇 بناء iOS الحقيقي
      - cd ios/App
      - xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos build

    artifacts:
      - ios/App/build/**/*.app