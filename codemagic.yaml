workflows:
  ios-workflow:
    name: iOS Build

    environment:
      node: 18

    scripts:
      - npm install

      # ❌ شيل Capacitor sync نهائيًا من السيرفر
      # - npx cap sync ios

      # ✔ بس بنبني iOS مباشرة
      - cd ios/App
      - xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos build

    artifacts:
      - ios/App/build/**/*.app